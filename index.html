<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR0 - Private Chat Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a0b10; --panel: #161b22; --accent: #8a2be2; --others-bg: #21262d; --text: #e6edf3; --neon: #00f2ff; }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            font-family: sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
        }

        .login-screen { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            padding: 0 20px;
            box-sizing: border-box;
        }
        
        .login-box { 
            background: var(--panel); 
            padding: 40px 25px; 
            border-radius: 15px; 
            border: 1px solid var(--accent); 
            text-align: center; 
            width: 100%;
            max-width: 320px; 
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3); 
        }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #0d1117; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #chat-app { 
            display: none; 
            height: 100%; 
            width: 100%;
            flex-direction: column; 
            position: fixed; 
            top: 0;
            left: 0;
        }

        header { 
            height: 60px;
            padding: 0 15px; 
            background: var(--panel); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--accent); 
            flex-shrink: 0;
        }

        .profile-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon); cursor: pointer; object-fit: cover; }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: var(--bg);
            padding-bottom: 20px;
        }

        .msg-wrapper { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; }
        
        .msg-wrapper.me { align-self: flex-end; flex-direction: row; }
        .msg-wrapper.me .msg-content { background: var(--accent); border-bottom-right-radius: 2px; }
        
        .msg-wrapper.others { align-self: flex-start; flex-direction: row-reverse; }
        .msg-wrapper.others .msg-content { background: var(--others-bg); border-bottom-left-radius: 2px; }
        .msg-wrapper.others .msg-name { color: #ff00ff; }

        .msg-content { padding: 10px 15px; border-radius: 12px; position: relative; word-break: break-word; }
        .msg-name { font-size: 10px; color: var(--neon); margin-bottom: 5px; font-weight: bold; }
        .msg-pp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--neon); flex-shrink: 0; }

        footer { 
            height: 70px;
            padding: 0 10px; 
            background: var(--panel); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            border-top: 1px solid #333;
            flex-shrink: 0; 
            box-sizing: border-box;
        }
        #msg-input { flex: 1; margin: 0; }

        .vn-btn { width: 60px; background: #222; border: 1px solid var(--accent); font-size: 11px; }
        .vn-btn.recording { background: #ff4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        audio { max-width: 100%; margin-top: 5px; height: 30px; border-radius: 5px; }

        /* Style Baru Tombol Call */
        .call-btn { 
            background: none; border: 1px solid var(--neon); color: var(--neon); 
            width: 35px; height: 35px; border-radius: 50%; padding: 0; 
            display: flex; justify-content: center; align-items: center; font-size: 18px;
        }
        .hangup-btn { background: #ff4444 !important; width: auto !important; padding: 5px 10px !important; display: none; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-box">
        <h2 style="color: var(--neon); margin-top: 0;">ACCESS GRANTED</h2>
        <input type="text" id="u-name" placeholder="Username">
        <input type="password" id="u-pass" placeholder="Password">
        <button onclick="login()">ENTER SYSTEM</button>
        <p id="err" style="color: #ff4444; font-size: 12px; margin-top: 10px;"></p>
    </div>
</div>

<div id="chat-app">
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <label for="pp-input"><img id="my-pp" class="profile-btn" src="https://via.placeholder.com/40" title="Klik ganti foto"></label>
            <input type="file" id="pp-input" hidden accept="image/*" onchange="updatePP(this)">
            <span id="display-name" style="color: var(--neon); font-weight: bold;"></span>
            <button id="start-call" class="call-btn">📞</button>
            <button id="end-call" class="hangup-btn">END</button>
        </div>
        <button onclick="location.reload()" style="width: auto; padding: 5px 15px; background: #333; font-size: 12px;">OUT</button>
    </header>
    
    <div id="chat-box"></div>
    <audio id="remote-audio" autoplay></audio>
    
    <footer>
        <input type="text" id="msg-input" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button id="vn-btn" class="vn-btn" onclick="toggleVN()">VOICE</button>
        <button onclick="sendMsg()" style="width: 70px;">SEND</button>
    </footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXK0vszoK1LJ3ksLp2",
        authDomain: "chatan-76693.firebaseapp.com",
        projectId: "chatan-76693",
        storageBucket: "chatan-76693.appspot.com",
        messagingSenderId: "497865591363",
        appId: "1:497865591363:web:2a9cb1619623910f115ce9",
        measurementId: "G-6SSJ5EK115",
        databaseURL: "https://chatan-76693-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = null;
    let peer;
    let localStream;
    let activeCall;

    // Logika VN
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    async function toggleVN() {
        const btn = document.getElementById('vn-btn');
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        const base64Audio = reader.result;
                        sendVN(base64Audio);
                    };
                };

                mediaRecorder.start();
                isRecording = true;
                btn.innerText = "STOP";
                btn.classList.add('recording');
            } catch (err) {
                alert("Gagal akses mic: " + err);
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            btn.innerText = "VOICE";
            btn.classList.remove('recording');
            if(mediaRecorder.stream) mediaRecorder.stream.getTracks().forEach(track => track.stop());
        }
    }

    function sendVN(audioData) {
        const pp = document.getElementById('my-pp').src;
        db.ref("global_chat").push({
            sender: currentUser.nama,
            vn: audioData,
            avatar: pp,
            time: Date.now()
        });
    }

    const daftarUser = {
        "Rafa": { pass: "RAFA12", nama: "RAFA" },
        "Dani": { pass: "dani123", nama: "DANI OWNER☑️" },
        "Repan": { pass: "repan72", nama: "REPAN" },
        "Rafka": { pass: "rafka79", nama: "RAFKA" },
        "Diki": { pass: "dIKI63", nama: "DIKI" },
        "Puji": { pass: "pujie27", nama: "PUJI" },
        "Alfi": { pass: "alfi21", nama: "ALFI" }
    };

    function login() {
        const user = document.getElementById('u-name').value.toLowerCase().trim();
        const pass = document.getElementById('u-pass').value;
        
        if(daftarUser[user] && daftarUser[user].pass === pass) {
            currentUser = daftarUser[user];
            currentUser.id = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-app').style.display = 'flex';
            document.getElementById('display-name').innerText = currentUser.nama;
            
            const savedPP = localStorage.getItem('pp_' + user);
            if(savedPP) document.getElementById('my-pp').src = savedPP;
            
            initPeer(user); // Aktifin fitur Call pake ID username
            loadChats();
        } else {
            document.getElementById('err').innerText = "ID atau Password Salah!";
        }
    }

    // --- LOGIKA FITUR CALL (PEERJS) ---
    function initPeer(userId) {
        peer = new Peer(userId); // ID Call adalah username login

        peer.on('call', (call) => {
            if (confirm("Ada panggilan masuk dari user lain. Angkat?")) {
                navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                    localStream = stream;
                    call.answer(stream);
                    handleCall(call);
                });
            }
        });
    }

    function handleCall(call) {
        activeCall = call;
        document.getElementById('end-call').style.display = "inline-block";
        document.getElementById('start-call').style.display = "none";

        call.on('stream', (remoteStream) => {
            document.getElementById('remote-audio').srcObject = remoteStream;
        });

        call.on('close', () => {
            endCallUI();
        });
    }

    document.getElementById('start-call').onclick = () => {
        const targetId = prompt("Masukkan Username tujuan (contoh: dani / rahel):").toLowerCase();
        if(!targetId || targetId === currentUser.id) return;

        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
            localStream = stream;
            const call = peer.call(targetId, stream);
            handleCall(call);
        }).catch(err => alert("Mic Error: " + err));
    };

    document.getElementById('end-call').onclick = () => {
        if(activeCall) activeCall.close();
        endCallUI();
    };

    function endCallUI() {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        document.getElementById('end-call').style.display = "none";
        document.getElementById('start-call').style.display = "flex";
    }
    // ---------------------------------

    function updatePP(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgData = e.target.result;
                document.getElementById('my-pp').src = imgData;
                localStorage.setItem('pp_' + currentUser.id, imgData);

                db.ref("global_chat").once("value", (snap) => {
                    const data = snap.val();
                    if(data) {
                        for(let id in data) {
                            if(data[id].sender === currentUser.nama) {
                                db.ref("global_chat/" + id).update({ avatar: imgData });
                            }
                        }
                    }
                });
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function sendMsg() {
        const txt = document.getElementById('msg-input').value.trim();
        if(!txt) return;
        const pp = document.getElementById('my-pp').src;
        
        db.ref("global_chat").push({
            sender: currentUser.nama,
            text: txt,
            avatar: pp,
            time: Date.now()
        });
        document.getElementById('msg-input').value = "";
    }

    function loadChats() {
        db.ref("global_chat").on("value", (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            const data = snap.val();
            if(data) {
                for(let id in data) {
                    const m = data[id];
                    const isMe = (m.sender === currentUser.nama);
                    const sideClass = isMe ? 'me' : 'others';

                    const div = document.createElement('div');
                    div.className = `msg-wrapper ${sideClass}`;
                    
                    let isiPesan = m.text ? `<div>${m.text}</div>` : `<audio controls src="${m.vn}"></audio>`;
                    
                    div.innerHTML = `
                        <div class="msg-content" onclick="deleteMsg('${id}', '${m.sender}')">
                            <div class="msg-name">${m.sender}</div>
                            ${isiPesan}
                        </div>
                        <img src="${m.avatar}" class="msg-pp">
                    `;
                    box.appendChild(div);
                }
                box.scrollTop = box.scrollHeight;
            }
        });
    }

    function deleteMsg(id, senderName) {
        if(senderName !== currentUser.nama) {
            alert("TIDAK BISA MENGHAPUS PESAN ORANG KAIN !.");
            return;
        }
        if(confirm("Hapus pesan ini?")) {
            db.ref("global_chat/" + id).remove();
        }
    }
</script>
</body>
    </html>
