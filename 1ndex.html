<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR0 - Private Chat Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a0b10; --panel: #161b22; --accent: #8a2be2; --others-bg: #21262d; --text: #e6edf3; --neon: #00f2ff; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background-color: var(--bg); color: var(--text); overflow: hidden; }
        #chat-app { display: none; height: 100%; width: 100%; flex-direction: column; position: fixed; top: 0; left: 0; }
        header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); }
        .profile-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon); cursor: pointer; object-fit: cover; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: var(--bg); }
        .msg-wrapper { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row; }
        .msg-wrapper.others { align-self: flex-start; flex-direction: row-reverse; }
        .msg-content { padding: 10px 15px; border-radius: 12px; position: relative; word-break: break-word; min-width: 50px; }
        .msg-wrapper.me .msg-content { background: var(--accent); border-bottom-right-radius: 2px; }
        .msg-wrapper.others .msg-content { background: var(--others-bg); border-bottom-left-radius: 2px; }
        .msg-name { font-size: 10px; color: var(--neon); margin-bottom: 5px; font-weight: bold; }
        .msg-pp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--neon); flex-shrink: 0; }
        footer { height: 70px; padding: 0 10px; background: var(--panel); display: flex; align-items: center; gap: 8px; border-top: 1px solid #333; }
        #msg-input { flex: 1; margin: 0; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0d1117; color: white; outline: none; }
        .vn-btn { width: 60px; background: #222; border: 1px solid var(--accent); font-size: 11px; color: white; border-radius: 8px; padding: 10px 0; cursor: pointer; }
        .vn-btn.recording { background: #ff4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        audio { max-width: 200px; height: 35px; display: block; margin-top: 5px; }
        button { background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: var(--panel); padding: 40px 25px; border-radius: 15px; border: 1px solid var(--accent); text-align: center; width: 320px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #0d1117; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-box">
        <h2 style="color: var(--neon);">LOGIN SYSTEM</h2>
        <input type="text" id="u-name" placeholder="Username">
        <input type="password" id="u-pass" placeholder="Password">
        <button onclick="login()" style="width: 100%; padding: 12px;">ENTER</button>
        <p id="err" style="color: #ff4444; font-size: 12px;"></p>
    </div>
</div>

<div id="chat-app">
    <header>
        <div style="display: flex; align-items: center; gap: 8px;">
            <label for="pp-input"><img id="my-pp" class="profile-btn" src="https://via.placeholder.com/40" title="Ganti Foto"></label>
            <input type="file" id="pp-input" hidden accept="image/*" onchange="updatePP(this)">
            <span id="display-name" style="color: var(--neon); font-weight: bold;"></span>
        </div>
        <button onclick="location.reload()" style="padding: 5px 10px; background: #333; font-size: 12px;">OUT</button>
    </header>
    <div id="chat-box"></div>
    <footer>
        <input type="text" id="msg-input" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button id="vn-btn" class="vn-btn" onclick="toggleVN()">VOICE</button>
        <button onclick="sendMsg()" style="width: 70px; height: 40px;">SEND</button>
    </footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXK0vszoK1LJ3ksLp2",
        authDomain: "chatan-76693.firebaseapp.com",
        projectId: "chatan-76693",
        storageBucket: "chatan-76693.appspot.com",
        messagingSenderId: "497865591363",
        appId: "1:497865591363:web:2a9cb1619623910f115ce9",
        measurementId: "G-6SSJ5EK115",
        databaseURL: "https://chatan-76693-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = null;

    // FUNGSI UPDATE FOTO DI SEMUA PESAN LAMA (REALTIME)
    function syncAllPhotos(newPhotoUrl) {
        if(!currentUser) return;
        
        // 1. Update di Database untuk semua pesan milik user ini
        db.ref("global_chat").once("value", (snap) => {
            const updates = {};
            snap.forEach((child) => {
                if(child.val().sender === currentUser.nama) {
                    updates[child.key + "/avatar"] = newPhotoUrl;
                }
            });
            db.ref("global_chat").update(updates);
        });

        // 2. Paksa ganti foto di elemen yang sudah tampil di layar tanpa nunggu reload
        const allWrappers = document.querySelectorAll('.msg-wrapper.me');
        allWrappers.forEach(wrapper => {
            const img = wrapper.querySelector('.msg-pp');
            if(img) img.src = newPhotoUrl;
        });
    }

    const daftarUser = {
        "rafa": { pass: "RAFA12", nama: "RAFA" },
        "dani": { pass: "dani123", nama: "DANI OWNER☑️" },
        "repan": { pass: "repan72", nama: "REPAN" },
        "rafka": { pass: "rafka79", nama: "RAFKA" },
        "diki": { pass: "dIKI63", nama: "DIKI" },
        "puji": { pass: "pujie27", nama: "PUJI" },
        "alfi": { pass: "alfi21", nama: "ALFI" }
    };

    function login() {
        const user = document.getElementById('u-name').value.toLowerCase().trim();
        const pass = document.getElementById('u-pass').value;
        if(daftarUser[user] && daftarUser[user].pass === pass) {
            currentUser = daftarUser[user];
            currentUser.id = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-app').style.display = 'flex';
            document.getElementById('display-name').innerText = currentUser.nama;
            
            const savedPP = localStorage.getItem('pp_' + user);
            if(savedPP) {
                document.getElementById('my-pp').src = savedPP;
                syncAllPhotos(savedPP); 
            }
            loadChats();
        } else { document.getElementById('err').innerText = "Username/Password Salah!"; }
    }

    function updatePP(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgData = e.target.result;
                document.getElementById('my-pp').src = imgData;
                localStorage.setItem('pp_' + currentUser.id, imgData);
                syncAllPhotos(imgData); 
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function sendMsg() {
        const txt = document.getElementById('msg-input').value.trim();
        if(!txt) return;
        db.ref("global_chat").push({
            sender: currentUser.nama,
            text: txt,
            avatar: document.getElementById('my-pp').src,
            time: Date.now()
        });
        document.getElementById('msg-input').value = "";
    }

    let mediaRecorder;
    let audioChunks = [];
    async function toggleVN() {
        const btn = document.getElementById('vn-btn');
        if (btn.innerText === "VOICE") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => {
                    db.ref("global_chat").push({
                        sender: currentUser.nama,
                        vn: reader.result,
                        avatar: document.getElementById('my-pp').src,
                        time: Date.now()
                    });
                };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            btn.innerText = "STOP";
            btn.classList.add('recording');
        } else {
            mediaRecorder.stop();
            btn.innerText = "VOICE";
            btn.classList.remove('recording');
        }
    }

    function loadChats() {
        db.ref("global_chat").on("value", (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach((child) => {
                const m = child.val();
                const isMe = (m.sender === currentUser.nama);
                const div = document.createElement('div');
                div.className = `msg-wrapper ${isMe ? 'me' : 'others'}`;
                div.innerHTML = `
                    <div class="msg-content" onclick="deleteMsg('${child.key}', '${m.sender}')">
                        <div class="msg-name">${m.sender}</div>
                        ${m.text ? `<div>${m.text}</div>` : `<audio controls src="${m.vn}"></audio>`}
                    </div>
                    <img src="${m.avatar}" class="msg-pp">
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function deleteMsg(id, name) {
        if(name === currentUser.nama && confirm("Hapus pesan ini?")) db.ref("global_chat/" + id).remove();
    }
</script>
</body>
</html>
